<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registeration-Form</title>
</head>
<body>
    <h1 style="color:rgb(12, 12, 12);text-align: center;"><u>Registration Form</u></h1>
    <form style="border: 1px solid black; padding: 20px; background-color: rgb(255, 255, 255); color: black; width: 300px; margin: auto;" action="/submit" method="post">
        <label for="name">Name:</label>
        <input type="text" id="name" name="name" required><br><br>
        <label for="date">Date of Birth:</label>
        <input type="date" id="date" name="date" required><br><br>
        <label for="email">Email:</label>
        <input type="email" id="email" name="email" required><br><br>

        <label for="password">Password:</label>
        <input type="password" id="password" name="password" required><br><br>

        <input type="submit" value="Register">

    </form>
    
</body>
</html>
