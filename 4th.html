<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Bootstrap Responsive Web Page</title>

    <!-- Bootstrap CDN -->
    <link rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>

<body>

    <!-- Navbar Start -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">

        <div class="container-fluid">

            <a class="navbar-brand" href="#">
                My Website
            </a>

            <button class="navbar-toggler"
            type="button"
            data-bs-toggle="collapse"
            data-bs-target="#menu">

                <span class="navbar-toggler-icon"></span>

            </button>

            <div class="collapse navbar-collapse" id="menu">

                <ul class="navbar-nav ms-auto">

                    <li class="nav-item">
                        <a class="nav-link active" href="#">
                            Home
                        </a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="#">
                            About
                        </a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="#">
                            Contact
                        </a>
                    </li>

                </ul>

            </div>

        </div>

    </nav>
    <!-- Navbar End -->


    <!-- Main Container -->
    <div class="container mt-5">

        <div class="row">

            <!-- Card 1 -->
            <div class="col-md-4">

                <div class="card shadow">

                    <img src="https://via.placeholder.com/300"
                    class="card-img-top">

                    <div class="card-body">

                        <h5 class="card-title">
                            Web Development
                        </h5>

                        <p class="card-text">
                            Learn HTML, CSS, JavaScript and Bootstrap.
                        </p>

                        <button class="btn btn-primary">
                            Learn More
                        </button>

                    </div>

                </div>

            </div>


            <!-- Card 2 -->
            <div class="col-md-4">

                <div class="card shadow">

                    <img src="https://via.placeholder.com/300"
                    class="card-img-top">

                    <div class="card-body">

                        <h5 class="card-title">
                            Python Programming
                        </h5>

                        <p class="card-text">
                            Learn Python for web and data science.
                        </p>

                        <button class="btn btn-success">
                            Start Now
                        </button>

                    </div>

                </div>

            </div>


            <!-- Card 3 -->
            <div class="col-md-4">

                <div class="card shadow">

                    <img src="https://via.placeholder.com/300"
                    class="card-img-top">

                    <div class="card-body">

                        <h5 class="card-title">
                            Data Science
                        </h5>

                        <p class="card-text">
                            Explore machine learning and AI concepts.
                        </p>

                        <button class="btn btn-danger">
                            Explore
                        </button>

                    </div>

                </div>

            </div>

        </div>

    </div>


    <!-- Bootstrap JS -->
    <script src=
    "https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js">
    </script>

</body>

</html>
